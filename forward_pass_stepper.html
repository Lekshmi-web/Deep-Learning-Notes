
<style>
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--color-border-secondary);display:inline-block;transition:background .3s;}
.step-dot.active{background:#534AB7;}
.step-btn{font-size:13px;padding:6px 18px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);}
.step-btn:hover{background:var(--color-background-secondary);}
</style>
<h2 class="sr-only">Interactive forward pass walkthrough — step through each stage of data moving through a neural network</h2>
<div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px;" id="dots"></div>
<svg width="100%" viewBox="0 0 680 230" id="fpsvg" role="img">
  <title>Forward pass diagram</title>
  <desc>Neural network showing input, hidden, and output layers with highlighted active path.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g id="layer-in">
    <circle cx="100" cy="80"  r="24" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="100" y="80"  text-anchor="middle" dominant-baseline="central" fill="#3C3489">x₁</text>
    <circle cx="100" cy="155" r="24" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="100" y="155" text-anchor="middle" dominant-baseline="central" fill="#3C3489">x₂</text>
  </g>
  <g id="conn-ih" opacity="0.2">
    <line x1="124" y1="80"  x2="276" y2="103" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="124" y1="80"  x2="276" y2="157" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="124" y1="155" x2="276" y2="103" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="124" y1="155" x2="276" y2="157" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
  </g>
  <g id="layer-h" opacity="0.3">
    <circle cx="300" cy="103" r="24" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="300" y="103" text-anchor="middle" dominant-baseline="central" fill="#085041">h₁</text>
    <circle cx="300" cy="157" r="24" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="300" y="157" text-anchor="middle" dominant-baseline="central" fill="#085041">h₂</text>
  </g>
  <g id="conn-ho" opacity="0.2">
    <line x1="324" y1="103" x2="556" y2="130" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="324" y1="157" x2="556" y2="130" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  </g>
  <g id="layer-out" opacity="0.3">
    <circle cx="580" cy="130" r="24" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="580" y="130" text-anchor="middle" dominant-baseline="central" fill="#712B13">ŷ</text>
  </g>
  <text class="ts" x="100"  y="200" text-anchor="middle" fill="var(--color-text-secondary)" id="lbl-in">Input</text>
  <text class="ts" x="300"  y="200" text-anchor="middle" fill="var(--color-text-secondary)" id="lbl-h">Hidden</text>
  <text class="ts" x="580"  y="200" text-anchor="middle" fill="var(--color-text-secondary)" id="lbl-out">Output</text>
  <text class="ts" x="200"  y="58"  text-anchor="middle" fill="var(--color-text-secondary)" id="lbl-w1">weights</text>
  <text class="ts" x="440"  y="58"  text-anchor="middle" fill="var(--color-text-secondary)" id="lbl-w2">weights</text>
</svg>
<div id="step-desc" style="font-size:14px;color:var(--color-text-secondary);text-align:center;margin:8px 0 16px;min-height:40px;"></div>
<div style="display:flex;justify-content:center;gap:12px;">
  <button class="step-btn" onclick="move(-1)">← Back</button>
  <button class="step-btn" onclick="move(1)">Next →</button>
</div>
<script>
const steps = [
  { desc:"Step 1 — Raw input data (x₁, x₂) enters the input layer.", in:1, cih:0.2, h:0.3, cho:0.2, out:0.3 },
  { desc:"Step 2 — Each input is multiplied by its weights and passed to the hidden layer.", in:1, cih:1, h:0.3, cho:0.2, out:0.3 },
  { desc:"Step 3 — Hidden neurons sum the weighted inputs, add bias, apply activation (e.g. ReLU). Features are extracted.", in:0.4, cih:0.4, h:1, cho:0.2, out:0.3 },
  { desc:"Step 4 — Hidden layer outputs flow through more weights to the output neuron.", in:0.4, cih:0.4, h:0.6, cho:1, out:0.3 },
  { desc:"Step 5 — Output neuron produces prediction ŷ. Forward pass complete!", in:0.4, cih:0.4, h:0.4, cho:0.4, out:1 }
];
let cur = 0;
const dotsEl = document.getElementById('dots');
steps.forEach((_,i) => { const d = document.createElement('span'); d.className='step-dot'+(i===0?' active':''); d.id='dot'+i; dotsEl.appendChild(d); });
function render(){
  const s = steps[cur];
  document.getElementById('layer-in').style.opacity = s.in;
  document.getElementById('conn-ih').style.opacity  = s.cih;
  document.getElementById('layer-h').style.opacity  = s.h;
  document.getElementById('conn-ho').style.opacity  = s.cho;
  document.getElementById('layer-out').style.opacity= s.out;
  document.getElementById('step-desc').textContent  = s.desc;
  steps.forEach((_,i) => document.getElementById('dot'+i).className='step-dot'+(i===cur?' active':''));
}
function move(d){ cur = Math.max(0,Math.min(steps.length-1,cur+d)); render(); }
render();
</script>
