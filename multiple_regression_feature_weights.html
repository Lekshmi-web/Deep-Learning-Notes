
<h2 class="sr-only">Multiple regression interactive demo — adjust sliders for study hours, sleep, and attendance to see how each feature contributes to a predicted exam score.</h2>
<style>
  #mr-wrap { padding: 1rem 0; }
  .feature-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .feat-label { font-size:13px; color:var(--color-text-secondary); width:120px; flex-shrink:0; }
  .feat-label b { display:block; font-weight:500; color:var(--color-text-primary); font-size:14px; }
  .feat-label small { font-size:11px; }
  input[type=range].feat { flex:1; min-width:100px; }
  .feat-val { font-size:14px; font-weight:500; color:var(--color-text-primary); min-width:32px; text-align:right; }
  .bar-wrap { flex:1; min-width:100px; height:10px; background:var(--color-background-secondary); border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; transition: width 0.2s; }
  .result-box { background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:1rem 1.25rem; margin-top:8px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .result-label { font-size:13px; color:var(--color-text-secondary); }
  .result-score { font-size:32px; font-weight:500; color:var(--color-text-primary); }
  .result-grade { font-size:16px; font-weight:500; padding:4px 12px; border-radius:var(--border-radius-md); }
  .eq-row { font-size:12px; color:var(--color-text-secondary); margin-top:10px; font-family:var(--font-mono); }
  .breakdown { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .bk-chip { font-size:12px; padding:3px 10px; border-radius:var(--border-radius-md); }
</style>
<div id="mr-wrap">

  <div class="feature-row">
    <div class="feat-label"><b>Study Hours</b><small>Weight: +5.0</small></div>
    <input type="range" class="feat" min="0" max="12" step="1" value="6" id="s1" oninput="update()">
    <div class="feat-val" id="v1">6h</div>
    <div class="bar-wrap"><div class="bar-fill" id="b1" style="background:#534AB7;"></div></div>
  </div>

  <div class="feature-row">
    <div class="feat-label"><b>Sleep Hours</b><small>Weight: +3.0</small></div>
    <input type="range" class="feat" min="0" max="10" step="1" value="7" id="s2" oninput="update()">
    <div class="feat-val" id="v2">7h</div>
    <div class="bar-wrap"><div class="bar-fill" id="b2" style="background:#1D9E75;"></div></div>
  </div>

  <div class="feature-row">
    <div class="feat-label"><b>Attendance</b><small>Weight: +0.4</small></div>
    <input type="range" class="feat" min="0" max="100" step="5" value="80" id="s3" oninput="update()">
    <div class="feat-val" id="v3">80%</div>
    <div class="bar-wrap"><div class="bar-fill" id="b3" style="background:#D85A30;"></div></div>
  </div>

  <div class="result-box">
    <div>
      <div class="result-label">Predicted score</div>
      <span class="result-score" id="score-out">—</span>
      <span style="font-size:16px;color:var(--color-text-secondary)"> / 100</span>
    </div>
    <div style="margin-left:auto;">
      <span class="result-grade" id="grade-out"></span>
    </div>
    <div style="width:100%;margin-top:4px;">
      <div class="breakdown" id="bk"></div>
    </div>
  </div>

  <div class="eq-row" id="eq-out"></div>
</div>
<script>
const W = [5.0, 3.0, 0.4];
const BIAS = 10;

function update() {
  const x1 = parseInt(document.getElementById('s1').value);
  const x2 = parseInt(document.getElementById('s2').value);
  const x3 = parseInt(document.getElementById('s3').value);

  document.getElementById('v1').textContent = x1 + 'h';
  document.getElementById('v2').textContent = x2 + 'h';
  document.getElementById('v3').textContent = x3 + '%';

  const contrib = [W[0]*x1, W[1]*x2, W[2]*x3];
  const raw = BIAS + contrib[0] + contrib[1] + contrib[2];
  const score = Math.min(100, Math.max(0, Math.round(raw)));

  document.getElementById('b1').style.width = Math.min(100, (contrib[0]/60)*100).toFixed(0) + '%';
  document.getElementById('b2').style.width = Math.min(100, (contrib[1]/30)*100).toFixed(0) + '%';
  document.getElementById('b3').style.width = Math.min(100, (contrib[2]/40)*100).toFixed(0) + '%';

  document.getElementById('score-out').textContent = score;

  let grade, gc, gt;
  if (score >= 90) { grade='A'; gc='var(--color-background-success)'; gt='var(--color-text-success)'; }
  else if (score >= 75) { grade='B'; gc='var(--color-background-info)'; gt='var(--color-text-info)'; }
  else if (score >= 60) { grade='C'; gc='var(--color-background-warning)'; gt='var(--color-text-warning)'; }
  else { grade='F'; gc='var(--color-background-danger)'; gt='var(--color-text-danger)'; }

  const gradeEl = document.getElementById('grade-out');
  gradeEl.textContent = 'Grade ' + grade;
  gradeEl.style.background = gc;
  gradeEl.style.color = gt;

  const chips = [
    { label:'Study', val:contrib[0].toFixed(1), c:'#EEEDFE', t:'#3C3489' },
    { label:'Sleep', val:contrib[1].toFixed(1), c:'#E1F5EE', t:'#085041' },
    { label:'Attend', val:contrib[2].toFixed(1), c:'#FAECE7', t:'#712B13' },
    { label:'Bias', val:BIAS, c:'#F1EFE8', t:'#444441' },
  ];
  document.getElementById('bk').innerHTML = chips.map(c =>
    `<span class="bk-chip" style="background:${c.c};color:${c.t}">${c.label}: +${c.val}</span>`
  ).join('');

  document.getElementById('eq-out').textContent =
    `y = ${BIAS} + 5.0×${x1} + 3.0×${x2} + 0.4×${x3} = ${raw.toFixed(1)} → clamped to ${score}`;
}

update();
</script>
